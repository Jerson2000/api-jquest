services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL_STRING=postgres://postgres:postgres@db:5432/jquest?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=secret
      - PORT=8080
      - GIN_MODE=release
    depends_on:
      - db
      - redis
    networks:
      - jquest-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=jquest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jquest-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - jquest-network

networks:
  jquest-network:
    driver: bridge

volumes:
  postgres_data:
